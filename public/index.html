<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Todo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top Nav -->
  <header class="header">
    <div class="header-inner">
      <h1 class="logo">Todo</h1>
      <div class="header-actions">
        <span class="icon-bolt">&#9889;</span>
        <div class="avatar">SM</div>
      </div>
    </div>
  </header>

  <!-- Stories Bar -->
  <div class="stories">
    <div class="story active">
      <div class="story-ring"><div class="story-avatar" style="background: #e0f2fe;">&#10003;</div></div>
      <span class="story-label">All</span>
    </div>
    <div class="story">
      <div class="story-ring"><div class="story-avatar" style="background: #fef3c7;">!</div></div>
      <span class="story-label">Today</span>
    </div>
    <div class="story">
      <div class="story-ring"><div class="story-avatar" style="background: #d1fae5;">&#9733;</div></div>
      <span class="story-label">Done</span>
    </div>
    <div class="story">
      <div class="story-ring"><div class="story-avatar" style="background: #ede9fe;">&#9829;</div></div>
      <span class="story-label">Liked</span>
    </div>
  </div>

  <!-- Create Post -->
  <div class="create-post">
    <div class="create-avatar">SM</div>
    <form class="create-form" id="todoForm">
      <input type="text" id="todoInput" placeholder="What needs to be done?" autocomplete="off">
      <button type="submit" class="post-btn" disabled>Post</button>
    </form>
  </div>

  <!-- Feed -->
  <main class="feed" id="feed"></main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    </div>
    <div class="nav-item nav-add" id="navAdd">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
  </nav>

  <script src="app.js"></script>
</body>
</html>
